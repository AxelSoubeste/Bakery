{% extends 'Bakery_app/base.html' %}
{% load static %}

{% block title %}Yara's Bakery{% endblock %}

{% block content %}
<a href="{% url 'home' %}"><button>Back</button></a>

<h2>Cart</h2>

{% for key, item in cart.items %}
    <p>{{ item.name }} - {{ item.stock }} x ${{ item.price }}</p>
{% endfor %}

<h3>Total: ${{ total }}</h3>

<a href="{% url 'checkout' %}"><button type="submit">Buy</button></a>
{% endblock %}
