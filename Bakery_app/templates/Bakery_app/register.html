{% extends 'Bakery_app/base.html' %}
{% load static %}

{% block title %}Register{% endblock %}

{% block content %}

<div class="register-page">

    <button class="btn-back" onclick="history.back()">Back</button>

    <div class="register-card">

        <h1>Create Account</h1>
        <p>Join Yara's Bakery and enjoy sweet moments.</p>

        <form method="POST" class="register-form">
            {% csrf_token %}

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

            <div class="password-box">
                <input type="password"
                       name="password"
                       id="password1"
                       placeholder="Password"
                       required>

                <button type="button"
                        class="toggle-password"
                        onclick="togglePassword('password1','eye1open','eye1closed')">

                    <svg id="eye1open" xmlns="http://www.w3.org/2000/svg" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">

                        <path stroke-linecap="round" stroke-linejoin="round"
                        stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>

                        <path stroke-linecap="round" stroke-linejoin="round"
                        stroke-width="2"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5
                        c4.478 0 8.268 2.943 9.542 7
                        -1.274 4.057-5.064 7-9.542 7
                        -4.477 0-8.268-2.943-9.542-7z"/>
                    </svg>

                    <svg id="eye1closed" xmlns="http://www.w3.org/2000/svg"
                    fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    style="display:none;">

                        <path stroke-linecap="round" stroke-linejoin="round"
                        stroke-width="2"
                        d="M3 3l18 18"/>
                    </svg>

                </button>
            </div>

            <div class="password-box">
                <input type="password"
                       name="confirm_password"
                       id="password2"
                       placeholder="Confirm Password"
                       required>

                <button type="button"
                        class="toggle-password"
                        onclick="togglePassword('password2','eye2open','eye2closed')">

                    <svg id="eye2open" xmlns="http://www.w3.org/2000/svg" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">

                        <path stroke-linecap="round" stroke-linejoin="round"
                        stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>

                        <path stroke-linecap="round" stroke-linejoin="round"
                        stroke-width="2"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5
                        c4.478 0 8.268 2.943 9.542 7
                        -1.274 4.057-5.064 7-9.542 7
                        -4.477 0-8.268-2.943-9.542-7z"/>
                    </svg>

                    <svg id="eye2closed" xmlns="http://www.w3.org/2000/svg"
                    fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    style="display:none;">

                        <path stroke-linecap="round" stroke-linejoin="round"
                        stroke-width="2"
                        d="M3 3l18 18"/>
                    </svg>

                </button>
            </div>

            <button type="submit" class="register-btn">
                Register
            </button>
        </form>

        {% if error %}
            <p class="register-error">{{ error }}</p>
        {% endif %}

        <p class="register-login">
            Already have an account?
            <a href="{% url 'login' %}">Log In</a>
        </p>

    </div>

</div>

<script>
function togglePassword(inputId, eyeOpenId, eyeClosedId){

    const input = document.getElementById(inputId);
    const openEye = document.getElementById(eyeOpenId);
    const closedEye = document.getElementById(eyeClosedId);

    if(input.type === "password"){
        input.type = "text";
        openEye.style.display = "none";
        closedEye.style.display = "block";
    }else{
        input.type = "password";
        openEye.style.display = "block";
        closedEye.style.display = "none";
    }
}
</script>

{% endblock %}
