{% extends 'Bakery_app/base.html' %}
{% load static %}

{% block title %}Catalog{% endblock %}

{% block content %}

{% for product in products %}
    <div>
        <h3>{{ product.name }}</h3>
        <p>${{ product.price }}</p>
        {% if product.image %}
            <img src="{{ product.image.url }}" width="200">
        {% else %}
            <p>No image</p>
        {% endif %}
    </div>
{% endfor %}

{% endblock %}
