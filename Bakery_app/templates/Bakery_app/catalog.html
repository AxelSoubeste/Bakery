{% extends 'Bakery_app/base.html' %}
{% load static %}

{% block title %}Catalog{% endblock %}

{% block content %}

{% for product in products %}
    <div>
        <h3>{{ product.name }}</h3>
        <p>${{ product.price }}</p>
        <img src="{{ product.image.url }}" width="200">
    </div>
{% endfor %}

{% endblock %}
